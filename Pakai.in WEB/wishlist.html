<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist Produk - Pakai.in</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            font-family: 'Instrument Sans', sans-serif;
        }

        .wishlist-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background-color: #fff;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .wishlist-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .wishlist-header .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s, transform 0.2s ease;
            color: #333;
        }

        .wishlist-header .back-btn:hover {
            color: #FF71B6;
            transform: translateX(-3px);
        }

        .wishlist-header .back-btn svg {
            stroke: currentColor;
        }

        .wishlist-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }



        .wishlist-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .product-card {
            background-color: #fff;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            width: 100%;
            height: 220px;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-heart {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 24px;
            color: #FF71B6;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .product-heart:hover {
            transform: scale(1.2);
        }

        .product-heart.empty {
            color: #ddd;
        }

        .product-info {
            padding: 15px;
        }

        .product-brand {
            font-size: 12px;
            color: #999;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-name {
            font-size: 14px;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            height: 2.8em;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-price {
            font-size: 16px;
            color: #FF71B6;
            font-weight: 700;
        }

        .empty-wishlist {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-wishlist i {
            font-size: 80px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-wishlist p {
            font-size: 18px;
            color: #999;
            margin-bottom: 20px;
        }

        .empty-wishlist a {
            display: inline-block;
            padding: 10px 30px;
            background-color: #FF71B6;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .empty-wishlist a:hover {
            background-color: #ff5a9e;
        }

        @media (max-width: 768px) {
            .wishlist-header {
                padding: 15px 20px;
            }

            .wishlist-header h1 {
                font-size: 22px;
            }

            .wishlist-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 15px;
            }

            .product-image {
                height: 160px;
                font-size: 40px;
            }
        }
    </style>
</head>
<body>
    <!-- Wishlist Header -->
    <div class="wishlist-header">
        <div class="wishlist-header-left">
            <button class="back-btn" onclick="history.back()" title="Kembali">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"></path>
                </svg>
            </button>
        </div>
        <h1>Wishlist Produk</h1>
    </div>

    <!-- Wishlist Content -->
    <div class="wishlist-container">
        <div class="wishlist-grid" id="wishlistGrid">
            <!-- Products will be added here by JavaScript -->
        </div>
    </div>

    <script>
        // Daftar semua produk dari berbagai kategori
        const allProducts = [
            // Women
            { id: 1, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian1.jpg", category: "women" },
            { id: 2, name: "Multicolored crochet sweater", brand: "Desigual", price: "Rp 2.449.000", image: "img/pakaian2.jpg", category: "women" },
            { id: 3, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian3.jpg", category: "women" },
            { id: 4, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian4.jpg", category: "women" },
            { id: 5, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian5.jpg", category: "women" },
            { id: 6, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian6.jpg", category: "women" },
            { id: 7, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian7.jpg", category: "women" },
            { id: 8, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian8.jpg", category: "women" },
            { id: 9, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian9.jpg", category: "women" },
            { id: 10, name: "Button Up Patches Cardigan", brand: "COLORBOX", price: "Rp 241.910", image: "img/pakaian10.jpg", category: "women" }
        ];

        // Get wishlist from localStorage
        function getWishlist() {
            const saved = localStorage.getItem('wishlist');
            return saved ? JSON.parse(saved) : [];
        }

        // Initialize wishlist
        function initializeWishlist() {
            const wishlistGrid = document.getElementById('wishlistGrid');
            const wishlistTitle = document.querySelector('.wishlist-header h1');
            const wishlistIds = getWishlist();
            const wishlistProducts = allProducts.filter(p => wishlistIds.includes(p.id));
            
            // Update title
            if (wishlistProducts.length === 0) {
                wishlistTitle.textContent = 'Wishlist';
            } else {
                wishlistTitle.textContent = 'Wishlist Produk';
            }
            
            if (wishlistProducts.length === 0) {
                wishlistGrid.innerHTML = `
                    <div class="empty-wishlist" style="grid-column: 1 / -1;">
                        <i class="fas fa-heart-broken"></i>
                        <p>Wishlist Anda masih kosong</p>
                        <a href="index.html">Mulai Mencari</a>
                    </div>
                `;
                return;
            }

            wishlistGrid.innerHTML = wishlistProducts.map(product => `
                <div class="product-card">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" onerror="this.style.display='none'">
                        <i class="fas fa-heart product-heart" onclick="removeFromWishlist(${product.id})"></i>
                    </div>
                    <div class="product-info">
                        <div class="product-brand">${product.brand}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price}</div>
                    </div>
                </div>
            `).join('');
        }

        // Remove from wishlist
        function removeFromWishlist(productId) {
            const wishlist = getWishlist();
            const updated = wishlist.filter(id => id !== productId);
            localStorage.setItem('wishlist', JSON.stringify(updated));
            initializeWishlist();
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializeWishlist);
    </script>
</body>
</html>
